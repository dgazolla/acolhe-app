<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Acolhe</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Acolhe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFCAA0">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass:        rgba(255, 255, 255, 0.58);
      --glass-border: rgba(255, 255, 255, 0.78);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-dark:    #1C1714;
      --text-mid:     #4A3F3A;
      --text-light:   #8A7870;
      --purple:       rgba(110, 90, 155, 0.85);
      --purple-glow:  rgba(110, 90, 155, 0.30);
      --crisis-text:  #7A1F1F;
      --crisis-bg:    rgba(248, 215, 218, 0.85);
      --crisis-bdr:   rgba(217, 83, 79, 0.40);
    }

    html {
      height: 100%;
      background:
        radial-gradient(ellipse at 12%  8%, rgba(255, 185, 145, 0.85) 0%, transparent 48%),
        radial-gradient(ellipse at 90%  5%, rgba(215, 150, 210, 0.75) 0%, transparent 45%),
        radial-gradient(ellipse at  5% 55%, rgba(155, 195, 235, 0.55) 0%, transparent 40%),
        radial-gradient(ellipse at 90% 55%, rgba(255, 215, 170, 0.55) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 95%, rgba(255, 185, 145, 0.70) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 90%, rgba(215, 150, 210, 0.65) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(245, 195, 215, 0.35) 0%, transparent 60%),
        #FBF0EC;
    }
    body {
      height: 100%;
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Shell ────────────────────────────────────────── */
    #app {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Welcome state ────────────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 36px 24px;
      gap: 36px;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    #welcome.out {
      opacity: 0;
      transform: translateY(-24px);
      pointer-events: none;
    }

    /* Orb */
    .orb {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        #FDDCCE 0%,
        #F9A8D4 26%,
        #C084FC 60%,
        #818CF8 100%
      );
      box-shadow:
        0 0 80px 20px rgba(240, 148, 200, 0.50),
        0 0 160px 55px rgba(192, 132, 252, 0.28),
        inset 0 -18px 36px rgba(255, 255, 255, 0.18),
        inset 0 12px 24px rgba(255, 255, 255, 0.38);
      animation: float 5.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-15px); }
    }

    .welcome-copy {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .welcome-copy h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(26px, 6.5vw, 38px);
      color: var(--text-dark);
      line-height: 1.22;
      letter-spacing: -0.4px;
    }
    .welcome-copy p {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.65;
      max-width: 310px;
      margin: 0 auto;
    }

    /* ── Chat state ───────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-area.visible { display: flex; }

    #header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 20px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .h-orb {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        #FDDCCE 0%, #F9A8D4 28%, #C084FC 62%, #818CF8 100%
      );
      box-shadow: 0 0 18px 5px rgba(192, 132, 252, 0.45);
      flex-shrink: 0;
    }
    .h-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 18px;
      color: var(--text-dark);
      font-weight: 400;
    }
    .h-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 1px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.10);
      border-radius: 2px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      gap: 3px;
      animation: pop 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);     }
    }
    .msg.user { align-self: flex-end;   align-items: flex-end;   }
    .msg.asst { align-self: flex-start; align-items: flex-start; }

    .msg-time {
      font-size: 10.5px;
      color: var(--text-light);
      padding: 0 5px;
      opacity: 0.65;
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 22px;
      font-size: 15px;
      line-height: 1.62;
      word-break: break-word;
    }
    .bubble.user {
      background: var(--purple);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 18px var(--purple-glow);
    }
    .bubble.asst {
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--text-dark);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 5px;
      box-shadow: var(--glass-shadow);
    }
    .bubble.crisis {
      background: var(--crisis-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid var(--crisis-bdr);
      color: var(--crisis-text);
    }

    .bp { display: block; }
    .bp + .bp { margin-top: 8px; }

    .verse {
      display: block;
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(255, 248, 228, 0.78);
      border-left: 3px solid rgba(175, 138, 55, 0.65);
      border-radius: 6px;
      font-style: italic;
      color: #7A5C2E;
      font-size: 14px;
      line-height: 1.58;
    }
    .verse::before { content: '📖  '; }

    /* Typing */
    #typing {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 4px 18px 10px;
      font-size: 13px;
      color: var(--text-light);
      flex-shrink: 0;
    }
    #typing.on { display: flex; }

    .dots { display: flex; gap: 4px; }
    .dots span {
      display: block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(110, 90, 155, 0.55);
      animation: bounce 1.3s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%, 70%, 100% { transform: translateY(0);    opacity: 0.4; }
      35%            { transform: translateY(-6px); opacity: 1.0; }
    }

    /* Error */
    #error {
      display: none;
      margin: 0 18px 8px;
      padding: 10px 14px;
      background: var(--crisis-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--crisis-bdr);
      border-radius: 12px;
      font-size: 13px;
      color: var(--crisis-text);
      flex-shrink: 0;
    }
    #error.on { display: block; }

    /* ── Composer ─────────────────────────────────────── */
    #composer {
      flex-shrink: 0;
      padding: 12px 18px 18px;
      padding-bottom: max(env(safe-area-inset-bottom, 18px), 18px);
    }
    #input-card {
      background: var(--glass);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      box-shadow: var(--glass-shadow);
      overflow: hidden;
    }
    #input {
      width: 100%;
      min-height: 62px;
      max-height: 180px;
      padding: 16px 18px 8px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      resize: none;
      overflow-y: auto;
      outline: none;
      line-height: 1.58;
    }
    #input::placeholder { color: rgba(90, 78, 72, 0.42); }
    #input::-webkit-scrollbar { width: 3px; }
    #input::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); }

    #input-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 12px 16px;
    }
    #char-hint {
      font-size: 11.5px;
      color: var(--text-light);
      opacity: 0.65;
    }
    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--purple);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
      box-shadow: 0 4px 14px var(--purple-glow);
    }
    #send-btn:disabled { opacity: .32; cursor: default; box-shadow: none; }
    #send-btn:not(:disabled):hover { background: rgba(85, 66, 130, 0.90); }
    #send-btn:not(:disabled):active { transform: scale(.91); }

    #input-hint {
      margin-top: 7px;
      text-align: right;
      font-size: 11px;
      color: var(--text-light);
      opacity: 0.45;
      padding-right: 2px;
    }

    /* ── Crisis banner ────────────────────────────────── */
    /* Banner de crise — só aparece quando detectado risco */
    #crisis-banner {
      display: none;
      flex-shrink: 0;
      padding: 12px 20px;
      background: rgba(248, 215, 218, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(217, 83, 79, 0.35);
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--crisis-text);
      line-height: 1.55;
    }
    #crisis-banner.visible { display: block; }
    #crisis-banner a {
      color: inherit;
      font-weight: 700;
      text-decoration: none;
    }

    /* Padding inferior para home indicator */
    #composer {
      padding-bottom: max(env(safe-area-inset-bottom), 18px);
    }

    /* ── Mobile ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .orb { width: 130px; height: 130px; }
      .welcome-copy h1 { font-size: 24px; }
      #welcome { padding: 36px 24px 16px; gap: 28px; }
      #messages { padding: 16px 12px 10px; }
      .msg { max-width: 88%; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Welcome ── -->
  <div id="welcome">
    <div class="orb"></div>
    <div class="welcome-copy">
      <h1>Como você se sente hoje?</h1>
      <p>Estou aqui para te ouvir, sem pressa e sem julgamento.</p>
    </div>
  </div>

  <!-- ── Chat ── -->
  <div id="chat-area">
    <div id="header">
      <div class="h-orb"></div>
      <div>
        <div class="h-title">Acolhe</div>
        <div class="h-sub">Apoio emocional · sempre aqui</div>
      </div>
    </div>
    <div id="messages"></div>
    <div id="typing">
      <div class="dots"><span></span><span></span><span></span></div>
      Pensando com carinho na sua resposta...
    </div>
    <div id="error"></div>
  </div>

  <!-- ── Composer ── -->
  <div id="composer">
    <div id="input-card">
      <textarea id="input" placeholder="Escreva como você está se sentindo..."></textarea>
      <div id="input-bar">
        <span id="char-hint"></span>
        <button id="send-btn" disabled aria-label="Enviar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <p id="input-hint">Enter para enviar &nbsp;·&nbsp; Shift+Enter para nova linha</p>
  </div>

  <!-- Banner de crise — oculto por padrão, aparece apenas em situação de risco -->
  <div id="crisis-banner">
    🆘 Em emergência: <a href="tel:188">188</a> (CVV) &nbsp;·&nbsp;
    <a href="tel:192">192</a> (SAMU) &nbsp;·&nbsp;
    <a href="tel:190">190</a> (Polícia)
  </div>

</div>

<script>
  const API_URL  = '';
  const VERSE_RE = /[A-ZÀ-Ú][a-zà-úçã]+(?:\s[A-ZÀ-Ú][a-zà-úçã]+)*\s\d{1,3}:\d{1,3}(?:-\d{1,3})?/;

  const welcomeEl    = document.getElementById('welcome');
  const chatAreaEl   = document.getElementById('chat-area');
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('input');
  const sendBtn      = document.getElementById('send-btn');
  const typingEl     = document.getElementById('typing');
  const errorEl      = document.getElementById('error');
  const crisisBanner = document.getElementById('crisis-banner');
  const charHint     = document.getElementById('char-hint');

  // History sempre começa com a saudação (não mostrada como bolha no welcome)
  const history = [
    { role: 'assistant', content: 'Olá. Eu estou aqui para te ouvir, sem pressa e sem julgamento.\n\nComo você se sente hoje?' }
  ];
  let chatStarted = false;

  /* helpers */
  const scrollBottom = () =>
    requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });

  const setError = (msg) => {
    errorEl.textContent = msg ?? '';
    errorEl.classList.toggle('on', Boolean(msg));
  };

  const setCrisis = (on) => crisisBanner.classList.toggle('visible', on);

  const clock = () =>
    new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  function buildContent(text) {
    const frag = document.createDocumentFragment();
    text.split(/\n+/).forEach(line => {
      if (!line.trim()) return;
      const el = document.createElement('span');
      if (VERSE_RE.test(line)) {
        el.className = 'verse';
      } else {
        el.className = 'bp';
      }
      el.textContent = line.trim();
      frag.appendChild(el);
    });
    return frag;
  }

  function addBubble(role, text, isCrisis = false) {
    const wrap   = document.createElement('div');
    wrap.className = `msg ${role === 'user' ? 'user' : 'asst'}`;

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role === 'user' ? 'user' : 'asst'}${isCrisis ? ' crisis' : ''}`;

    role === 'user'
      ? (bubble.textContent = text)
      : bubble.appendChild(buildContent(text));

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = clock();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function startChat() {
    // Renderiza a saudação como primeira bolha
    addBubble('assistant', history[0].content);
    welcomeEl.classList.add('out');
    // Aguarda fade-out antes de mostrar a área de chat
    setTimeout(() => {
      welcomeEl.style.display = 'none';
      chatAreaEl.classList.add('visible');
    }, 460);
    chatStarted = true;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    if (!chatStarted) startChat();
    // Pequeno delay para a transição visual não cortar a animação
    await new Promise(r => chatStarted ? r() : setTimeout(r, 480));

    setError(null);
    addBubble('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    charHint.textContent = '';
    sendBtn.disabled = true;
    typingEl.classList.add('on');
    scrollBottom();

    try {
      const res  = await fetch(`${API_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      history.push({ role: 'assistant', content: data.text });
      addBubble('assistant', data.text, data.isCrisis);
      setCrisis(Boolean(data.isCrisis));
    } catch {
      setError('Não foi possível obter uma resposta agora. Verifique sua conexão e tente novamente.');
    } finally {
      typingEl.classList.remove('on');
      sendBtn.disabled = !inputEl.value.trim();
      scrollBottom();
    }
  }

  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    charHint.textContent = len > 20 ? `${len} car.` : '';
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
